services:
  - type: web
    name: sparesense-backend
    runtime: python
    # Render runs commands from the repo root by default, so use explicit paths.
    buildCommand: python -m pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NESSIE_API_KEY
        sync: false  # You'll add this manually in Render dashboard
      - key: SOLANA_MAIN_WALLET_PRIVATE_KEY
        sync: false  # You'll add this manually in Render dashboard
