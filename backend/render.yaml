services:
  - type: web
    name: finwise-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NESSIE_API_KEY
        sync: false  # You'll add this manually in Render dashboard
